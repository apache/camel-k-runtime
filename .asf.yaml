github:
  description: "Apache Camel K runtime"
  homepage: https://camel.apache.org
  labels:
    - camel
    - integration
    - kubernetes
    - serverless
    - knative
    - openshift
    - operator
  enabled_merge_buttons:
    merge: false
    rebase: true
    squash: true
  rulesets:
    - name: "Default Branch Protection"
      type: branch
      branches:
        includes:
          - "~DEFAULT_BRANCH"
          - "release/*"
          - "rel/*"
        excludes: []
      bypass_teams:
        - root
      restrict_deletion: true
      restrict_force_push: true
